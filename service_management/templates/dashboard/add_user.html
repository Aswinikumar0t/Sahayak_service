<style>
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

.modal-content {
    background: white;
    margin: 5% auto;
    padding: 30px;
    border-radius: 12px;
    width: 450px;
}

/* ✅ Heading center */
.modal-content h2 {
    text-align: center;
    color: #2c6ed5;
    margin-bottom: 20px;
}

.close {
    float: right;
    font-size: 22px;
    cursor: pointer;
    color: #888;
}

.close:hover { color: #333; }

/* ✅ Two column row */
.form-row {
    display: flex;
    gap: 12px;
}

.form-row .form-group {
    flex: 1;
}

.form-group {
    margin-bottom: 14px;
}

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    box-sizing: border-box;
}

.form-group input:focus,
.form-group select:focus {
    border-color: #2c6ed5;
    outline: none;
}

/* ✅ Password wrapper for eye toggle */
.password-wrapper {
    position: relative;
}

.password-wrapper input {
    width: 100%;
    padding-right: 38px;
    box-sizing: border-box;
}

.eye-toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 16px;
    color: #aaa;
    user-select: none;
}

.eye-toggle:hover { color: #555; }

/* ✅ Button row */
.btn-row {
    display: flex;
    gap: 12px;
    margin-top: 18px;
}

.btn-submit {
    flex: 1;
    padding: 10px;
    background: #2c6ed5;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
}

.btn-submit:hover { background: #1f57ac; }

.btn-cancel {
    flex: 1;
    padding: 10px;
    background: #f0f0f0;
    color: #555;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
}

.btn-cancel:hover { background: #ddd; }

/* ✅ Error message */
.error-msg {
    display: none;
    color: #e74c3c;
    font-size: 12px;
    margin-top: -10px;
    margin-bottom: 10px;
}
</style>

<!-- ✅ Modal Popup -->
<div id="userModal" class="modal">
    <div class="modal-content">

        <span class="close" onclick="closeModal()">&times;</span>

        <!-- ✅ Centered heading -->
        <h2>Add New User</h2>

        <form method="POST" action="{% url 'add_user' %}" onsubmit="return validateForm()" autocomplete="off">
            {% csrf_token %}

            <!-- ✅ First Name + Last Name -->
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" placeholder="First name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" placeholder="Last name" required>
                </div>
            </div>

            <!-- Username -->
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter email" required>
            </div>

            <!-- ✅ Password with eye toggle -->
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" placeholder="Enter password" required>
                    <span class="eye-toggle" onclick="togglePassword('password', this)">👁️</span>
                </div>
            </div>

            <!-- ✅ Confirm Password with eye toggle -->
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm password" required>
                    <span class="eye-toggle" onclick="togglePassword('confirm_password', this)">👁️</span>
                </div>
            </div>
            <div class="error-msg" id="passwordError">
                ⚠️ Passwords do not match!
            </div>

            <!-- Role -->
            <div class="form-group">
                <label>Role</label>
                <select name="role">
                    <option value="admin">Admin</option>
                    <option value="manager">Manager</option>
                    <option value="corporate_partner">Corporate Partner</option>
                    <option value="solo_partner">Solo Partner</option>
                    <option value="staff">Staff</option>
                </select>
            </div>

            <!-- ✅ Submit + Cancel buttons -->
            <div class="btn-row">
                <button type="submit" class="btn-submit">Create User</button>
                <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>

        </form>
    </div>
</div>

<script>
function openModal() {
    document.getElementById("userModal").style.display = "block";
}

function closeModal() {
    document.getElementById("userModal").style.display = "none";
    document.getElementById("passwordError").style.display = "none";
}

// ✅ Eye toggle for password fields
function togglePassword(fieldId, icon) {
    const field = document.getElementById(fieldId);
    if (field.type === "password") {
        field.type = "text";
        icon.textContent = "🙈";
    } else {
        field.type = "password";
        icon.textContent = "👁️";
    }
}

// ✅ Validate passwords match before submit
function validateForm() {
    const password        = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm_password").value;
    const errorMsg        = document.getElementById("passwordError");

    if (password !== confirmPassword) {
        errorMsg.style.display = "block";
        return false;   // ← stops form submission
    }
    errorMsg.style.display = "none";
    return true;        // ← allows form submission
}

window.onclick = function(event) {
    var modal = document.getElementById("userModal");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
</script>
