{% load static %}

<style>
    /* Register Popup Modal Styles */
    .register-modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(5px);
        animation: fadeIn 0.3s ease;
    }

    .register-modal.open {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .register-modal-content {
        background: white;
        border-radius: 20px;
        width: 90%;
        max-width: 480px;
        max-height: 85vh;
        overflow-y: auto;
        position: relative;
        animation: slideUp 0.3s ease;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    @keyframes slideUp {
        from {
            transform: translateY(50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    /* Custom Scrollbar */
    .register-modal-content::-webkit-scrollbar {
        width: 4px;
    }

    .register-modal-content::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 10px;
    }

    .register-modal-content::-webkit-scrollbar-thumb {
        background: #1e88e5;
        border-radius: 10px;
    }

    /* Close Button */
    .close-register-modal {
        position: absolute;
        right: 15px;
        top: 15px;
        font-size: 24px;
        cursor: pointer;
        color: #999;
        transition: transform 0.2s, color 0.2s;
        z-index: 10;
    }

    .close-register-modal:hover {
        transform: rotate(90deg);
        color: #1e88e5;
    }

    /* Logo Section */
    .register-logo {
        text-align: center;
        padding: 20px 30px 0px 30px;
    }

    .register-logo img {
        height: 55px;
        object-fit: contain;
    }

    /* Heading Section */
    .register-heading {
        text-align: center;
        padding: 0 30px 5px 30px;
    }

    .register-heading h2 {
        color: #1e88e5;
        margin: 0;
        font-size: 22px;
        font-family: 'Poppins', sans-serif;
    }

    .register-heading p {
        color: #666;
        margin: 2px 0 0;
        font-size: 13px;
    }

    /* Form Body */
    .register-modal-body {
        padding: 5px 25px 20px 25px;
    }

    /* Form Groups */
    .form-group {
        margin-bottom: 12px;
    }

    .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #555;
        margin-bottom: 4px;
    }

    .form-group label .required {
        color: #ef4444;
        margin-left: 3px;
    }

    .input-icon {
        position: relative;
    }

    .input-icon i {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #999;
        font-size: 14px;
    }

    .input-icon input,
    .input-icon select,
    .input-icon textarea {
        width: 100%;
        padding: 10px 10px 10px 38px;
        border: 1.5px solid #e0e0e0;
        border-radius: 8px;
        font-size: 13px;
        font-family: 'DM Sans', sans-serif;
        transition: all 0.3s;
    }

    .input-icon textarea {
        padding: 10px 10px 10px 38px;
        resize: vertical;
    }

    .input-icon input:focus,
    .input-icon select:focus,
    .input-icon textarea:focus {
        outline: none;
        border-color: #1e88e5;
        box-shadow: 0 0 0 3px rgba(30,136,229,0.1);
    }

    /* Password Toggle */
    .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #999;
        font-size: 14px;
    }

    .password-toggle:hover {
        color: #1e88e5;
    }

    /* Form Row */
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    /* Radio Group */
    .radio-group {
        display: flex;
        gap: 15px;
        margin-top: 5px;
    }

    .radio-group label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: normal;
        cursor: pointer;
        font-size: 12px;
    }

    .radio-group input {
        width: auto;
        margin: 0;
    }

    /* File Upload */
    .file-upload {
        border: 2px dashed #e0e0e0;
        padding: 10px;
        text-align: center;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        background: #f9f9f9;
    }

    .file-upload:hover {
        border-color: #1e88e5;
        background: #eaf2fb;
    }

    .file-upload input {
        display: none;
    }

    .file-upload .upload-text {
        color: #666;
        font-size: 12px;
    }

    .file-upload .upload-text i {
        font-size: 20px;
        display: block;
        margin-bottom: 3px;
    }

    /* Terms Checkbox */
    .terms-group {
        margin: 12px 0;
    }

    .terms-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: normal;
        cursor: pointer;
        font-size: 12px;
        color: #666;
    }

    .terms-group a {
        color: #1e88e5;
        text-decoration: none;
    }

    .terms-group a:hover {
        text-decoration: underline;
    }

    /* Register Button */
    .register-btn-submit {
        width: 100%;
        padding: 10px;
        background: linear-gradient(135deg, #1e88e5, #1565c0);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        font-family: 'Poppins', sans-serif;
        margin-top: 5px;
    }

    .register-btn-submit:hover {
        transform: translateY(-1px);
        box-shadow: 0 3px 10px rgba(30,136,229,0.3);
    }

    /* Divider */
    .register-divider {
        text-align: center;
        position: relative;
        margin: 12px 0;
    }

    .register-divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: #e0e0e0;
    }

    .register-divider span {
        background: white;
        padding: 0 12px;
        position: relative;
        color: #999;
        font-size: 12px;
    }

    /* Social Login */
    .social-register {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
    }

    .social-btn {
        flex: 1;
        padding: 8px;
        border: 1.5px solid #e0e0e0;
        border-radius: 8px;
        background: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.3s;
    }

    .social-btn:hover {
        border-color: #1e88e5;
        background: #f5f5f5;
        transform: translateY(-1px);
    }

    .social-btn.google {
        color: #db4437;
    }

    .social-btn.facebook {
        color: #4267B2;
    }

    /* Login Link */
    .login-link {
        text-align: center;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #e0e0e0;
        font-size: 12px;
        color: #666;
    }

    .login-link a {
        color: #1e88e5;
        text-decoration: none;
        font-weight: 600;
    }

    .login-link a:hover {
        text-decoration: underline;
    }

    /* Error Message */
    .error-message {
        background: #fee2e2;
        color: #ef4444;
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12px;
        margin-bottom: 10px;
        display: none;
    }

    .error-message.show {
        display: block;
    }

    /* Success Message */
    .success-message {
        background: #d4edda;
        color: #22c55e;
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12px;
        margin-bottom: 10px;
        display: none;
    }

    .success-message.show {
        display: block;
    }

    /* Loading State */
    .loading {
        display: none;
        text-align: center;
        margin-top: 5px;
        font-size: 12px;
    }

    .loading.show {
        display: block;
    }

    .loading-spinner {
        width: 16px;
        height: 16px;
        border: 2px solid #e0e0e0;
        border-top-color: #1e88e5;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: inline-block;
        margin-right: 6px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 500px) {
        .form-row {
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .register-modal-body {
            padding: 5px 20px 15px 20px;
        }
        .register-logo {
            padding: 15px 20px 0px 20px;
        }
        .register-logo img {
            height: 45px;
        }
        .register-heading h2 {
            font-size: 20px;
        }
        .radio-group {
            flex-wrap: wrap;
            gap: 10px;
        }
    }
</style>

<!-- Register Modal -->
<div id="registerModal" class="register-modal">
    <div class="register-modal-content">
        <!-- Close Button -->
        <span class="close-register-modal" onclick="closeRegisterModal()">&times;</span>
        
        <!-- Logo Section -->
        <div class="register-logo">
            <img src="{% static 'icon/navbar_logo.png' %}" alt="Sahayak Logo">
        </div>
        
        <!-- Heading Section -->
        <div class="register-heading">
            <h2>Create Account</h2>
            <p>Join Sahayak and get trusted services at your doorstep</p>
        </div>
        
        <!-- Form Body -->
        <div class="register-modal-body">
            <!-- Error Message -->
            <div id="registerError" class="error-message"></div>
            <!-- Success Message -->
            <div id="registerSuccess" class="success-message"></div>

            <form id="registerForm" method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- Full Name -->
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <div class="input-icon">
                        <i>👤</i>
                        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <div class="input-icon">
                        <i>📧</i>
                        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                    </div>
                </div>

                <!-- Phone Number -->
                <div class="form-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <div class="input-icon">
                        <i>📞</i>
                        <input type="tel" id="phone" name="phone" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
                    </div>
                </div>

                <!-- Password & Confirm Password -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Password <span class="required">*</span></label>
                        <div class="input-icon">
                            <i>🔒</i>
                            <input type="password" id="password" name="password" placeholder="Create a password" required>
                            <span class="password-toggle" onclick="togglePassword('password')">👁️</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password <span class="required">*</span></label>
                        <div class="input-icon">
                            <i>🔒</i>
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                            <span class="password-toggle" onclick="togglePassword('confirm_password')">👁️</span>
                        </div>
                    </div>
                </div>

                <!-- Gender -->
                <div class="form-group">
                    <label>Gender <span class="required">*</span></label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="gender" value="male" required> Male
                        </label>
                        <label>
                            <input type="radio" name="gender" value="female"> Female
                        </label>
                        <label>
                            <input type="radio" name="gender" value="other"> Other
                        </label>
                    </div>
                </div>

                <!-- Address -->
                <div class="form-group">
                    <label>Address <span class="required">*</span></label>
                    <div class="input-icon">
                        <i>📍</i>
                        <textarea name="address" id="address" rows="2" placeholder="Enter your full address" required></textarea>
                    </div>
                </div>

                <!-- Landmark & Pincode -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Landmark</label>
                        <div class="input-icon">
                            <i>🏠</i>
                            <input type="text" name="landmark" placeholder="Nearby landmark (optional)">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Pincode <span class="required">*</span></label>
                        <div class="input-icon">
                            <i>📮</i>
                            <input type="text" name="pincode" placeholder="6-digit pincode" pattern="[0-9]{6}" required>
                        </div>
                    </div>
                </div>

                <!-- City & State -->
                <div class="form-row">
                    <div class="form-group">
                        <label>City <span class="required">*</span></label>
                        <div class="input-icon">
                            <i>🏙️</i>
                            <input type="text" name="city" placeholder="Enter your city" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>State <span class="required">*</span></label>
                        <div class="input-icon">
                            <i>🗺️</i>
                            <input type="text" name="state" placeholder="Enter your state" required>
                        </div>
                    </div>
                </div>

                <!-- Profile Photo Upload -->
                <div class="form-group">
                    <label>Profile Photo (Optional)</label>
                    <div class="file-upload" onclick="document.getElementById('profilePhoto').click()">
                        <div class="upload-text">
                            <i>📸</i>
                            <span>Click to upload profile photo</span>
                            <small>JPG, PNG (Max 5MB)</small>
                        </div>
                        <input type="file" id="profilePhoto" name="profile_photo" accept="image/*">
                    </div>
                </div>

                <!-- Terms & Conditions -->
                <div class="terms-group">
                    <label>
                        <input type="checkbox" id="terms" required>
                        I agree to the <a href="#" onclick="openTermsModal(); return false;">Terms & Conditions</a> and 
                        <a href="#" onclick="openPrivacyModal(); return false;">Privacy Policy</a>
                    </label>
                </div>

                <!-- Register Button -->
                <button type="submit" class="register-btn-submit">Create Account →</button>

                <!-- Loading -->
                <div id="registerLoading" class="loading">
                    <span class="loading-spinner"></span> Creating account...
                </div>

                <!-- Divider -->
                <div class="register-divider">
                    <span>Or sign up with</span>
                </div>

                <!-- Social Login -->
                <div class="social-register">
                    <button type="button" class="social-btn google" onclick="socialRegister('google')">
                        🅶 Google
                    </button>
                    <button type="button" class="social-btn facebook" onclick="socialRegister('facebook')">
                        𝕗 Facebook
                    </button>
                </div>

                <!-- Login Link -->
                <div class="login-link">
                    Already have an account? <a href="#" onclick="closeRegisterModal(); openLoginModal(); return false;">Login here</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    // Open Register Modal
    function openRegisterModal() {
        document.getElementById('registerModal').classList.add('open');
        document.body.style.overflow = 'hidden';
        document.getElementById('registerError').classList.remove('show');
        document.getElementById('registerSuccess').classList.remove('show');
    }

    // Close Register Modal
    function closeRegisterModal() {
        document.getElementById('registerModal').classList.remove('open');
        document.body.style.overflow = '';
        document.getElementById('registerForm').reset();
    }

    // Toggle Password Visibility
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const toggle = field.nextElementSibling;
        if (field.type === 'password') {
            field.type = 'text';
            toggle.innerHTML = '🙈';
        } else {
            field.type = 'password';
            toggle.innerHTML = '👁️';
        }
    }

    // Social Register
    function socialRegister(provider) {
        alert(`Sign up with ${provider} coming soon!`);
    }

    // Get CSRF Token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // Handle Register Form Submission - ACTUAL API CALL
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Get form values
        const fullname = document.getElementById('fullname').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        const gender = document.querySelector('input[name="gender"]:checked');
        const address = document.getElementById('address').value;
        const landmark = document.querySelector('input[name="landmark"]').value;
        const pincode = document.querySelector('input[name="pincode"]').value;
        const city = document.querySelector('input[name="city"]').value;
        const state = document.querySelector('input[name="state"]').value;
        const terms = document.getElementById('terms').checked;
        
        // Validation
        const errorDiv = document.getElementById('registerError');
        
        if (!fullname) {
            errorDiv.textContent = 'Please enter your full name';
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
            return;
        }
        
        if (!email || !email.includes('@')) {
            errorDiv.textContent = 'Please enter a valid email address';
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
            return;
        }
        
        if (!phone || phone.length !== 10) {
            errorDiv.textContent = 'Please enter a valid 10-digit phone number';
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
            return;
        }
        
        if (!password || password.length < 6) {
            errorDiv.textContent = 'Password must be at least 6 characters';
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
            return;
        }
        
        if (password !== confirmPassword) {
            errorDiv.textContent = 'Passwords do not match';
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
            return;
        }
        
        if (!gender) {
            errorDiv.textContent = 'Please select your gender';
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
            return;
        }
        
        if (!address) {
            errorDiv.textContent = 'Please enter your address';
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
            return;
        }
        
        if (!pincode || pincode.length !== 6) {
            errorDiv.textContent = 'Please enter a valid 6-digit pincode';
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
            return;
        }
        
        if (!city) {
            errorDiv.textContent = 'Please enter your city';
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
            return;
        }
        
        if (!state) {
            errorDiv.textContent = 'Please enter your state';
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
            return;
        }
        
        if (!terms) {
            errorDiv.textContent = 'Please agree to the Terms & Conditions';
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
            return;
        }
        
        // Clear error
        errorDiv.classList.remove('show');
        
        // Show loading
        const submitBtn = document.querySelector('.register-btn-submit');
        const loading = document.getElementById('registerLoading');
        submitBtn.style.display = 'none';
        loading.classList.add('show');
        
        // Split fullname
        const nameParts = fullname.trim().split(' ');
        const firstName = nameParts[0];
        const lastName = nameParts.slice(1).join(' ');
        
        try {
            // ACTUAL API CALL - NOT SIMULATION
            const response = await fetch('/accounts/api/register/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    username: email,
                    email: email,
                    phone: phone,
                    password: password,
                    confirm_password: confirmPassword,
                    first_name: firstName,
                    last_name: lastName,
                    address: address
                })
            });
            
            const data = await response.json();
            console.log('Registration response:', data);
            
            if (response.status === 201) {
                // Success
                const successDiv = document.getElementById('registerSuccess');
                successDiv.textContent = 'Account created successfully! Please login.';
                successDiv.classList.add('show');
                
                setTimeout(() => {
                    closeRegisterModal();
                    openLoginModal();
                }, 2000);
            } else {
                // Error
                const errorMsg = data.errors?.email?.[0] || 
                                data.errors?.username?.[0] || 
                                data.errors?.password?.[0] ||
                                data.message || 
                                'Registration failed';
                errorDiv.textContent = errorMsg;
                errorDiv.classList.add('show');
                submitBtn.style.display = 'block';
                loading.classList.remove('show');
                
                setTimeout(() => errorDiv.classList.remove('show'), 5000);
            }
        } catch (error) {
            console.error('Registration error:', error);
            errorDiv.textContent = 'Network error. Please try again.';
            errorDiv.classList.add('show');
            submitBtn.style.display = 'block';
            loading.classList.remove('show');
            
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }
    });

    // Close modal on outside click
    window.onclick = function(event) {
        const registerModal = document.getElementById('registerModal');
        if (event.target === registerModal) {
            closeRegisterModal();
        }
    }
</script>
